<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>PrijsMij – Kopers plaatsen een uitvraag, winkeliers bieden</title>
    <meta name="description" content="Op PrijsMij zet jij de spelregels. Plaats je uitvraag gratis, ontvang biedingen van lokale winkeliers en kies het beste aanbod. Altijd de scherpste prijs." />
    <meta name="keywords" content="prijsmij, omgekeerde marktplaats, uitvraag plaatsen, bieden, beste prijs, lokale winkeliers, aankoop, vergelijk aanbod" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="PrijsMij" />
    <link rel="canonical" href="https://prijsmij.nl/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prijsmij.nl/" />
    <meta property="og:site_name" content="PrijsMij" />
    <meta property="og:title" content="PrijsMij – Jij vraagt, winkeliers bieden" />
    <meta property="og:description" content="Plaats gratis een uitvraag voor je gewenste product. Ontvang scherpe biedingen van lokale winkeliers en kies zelf de beste deal." />
    <meta property="og:image" content="https://prijsmij.nl/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="nl_NL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@prijsmij" />
    <meta name="twitter:title" content="PrijsMij – Jij vraagt, winkeliers bieden" />
    <meta name="twitter:description" content="Plaats gratis een uitvraag voor je gewenste product. Ontvang scherpe biedingen van lokale winkeliers en kies zelf de beste deal." />
    <meta name="twitter:image" content="https://prijsmij.nl/og-image.png" />

    <!-- Structured Data – WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PrijsMij",
      "url": "https://prijsmij.nl/",
      "description": "Omgekeerde marktplaats: kopers plaatsen een uitvraag, winkeliers bieden.",
      "inLanguage": "nl-NL",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://prijsmij.nl/requests?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data – Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PrijsMij",
      "url": "https://prijsmij.nl/",
      "logo": "https://prijsmij.nl/favicon.svg",
      "sameAs": []
    }
    </script>

    <!-- Performance: preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
