<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4514"/>
      <stop offset="100%" stop-color="#4D96FF"/>
    </linearGradient>
  </defs>

  <!-- Circular icon (r=44, center 50,50) -->
  <circle cx="50" cy="50" r="44" fill="url(#g)"/>

  <!-- Lucide TrendingDown icon scaled to fit circle (24x24 → ~76x76, offset 12,12) -->
  <!-- Main line: (2,7)→(8.5,13.5)→(13.5,8.5)→(22,17) scaled 3.17x + offset 12 -->
  <polyline
    points="18.3,34.2  39.0,54.8  54.8,39.0  81.7,65.9"
    stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow: (16,17)→(22,17)→(22,11) -->
  <polyline
    points="62.7,65.9  81.7,65.9  81.7,46.9"
    stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "PrijsMij" text in Outfit 800 -->
  <text x="106" y="66" font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="54" letter-spacing="-1.5">
    <tspan fill="#1E1066">Prijs</tspan><tspan fill="#FF4514">Mij</tspan>
  </text>
</svg>
