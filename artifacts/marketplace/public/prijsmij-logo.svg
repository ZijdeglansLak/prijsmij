<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4514"/>
      <stop offset="100%" stop-color="#4D96FF"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="url(#logoGrad)"/>

  <!-- TrendingDown icon -->
  <polyline points="12,28 26,40 36,32 52,52" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="40,52 52,52 52,40" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Logo text as one block -->
  <text x="80" y="54" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="40">
    <tspan fill="#1E1066">Prijs</tspan><tspan fill="#FF4514">Mij</tspan>
  </text>
</svg>
